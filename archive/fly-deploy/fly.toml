# See https://fly.io/docs/reference/configuration/ for how to use this file.

app = 'wifibuddy'
primary_region = 'lax'

[env]
  # Tell db.py to look inside the mounted volume
  DATABASE_PATH = "/data/wifibuddy.db"

[mounts]
  source = "wifibuddy_data"
  destination = "/data"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1