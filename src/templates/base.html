<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}wifibuddy{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    .speed-fast  { color: #2d9614; font-weight: bold; }
    .speed-ok    { color: #b45309; font-weight: bold; }
    .speed-slow  { color: #dc2626; font-weight: bold; }
    .speed-unknown { color: #6b7280; }
    .nav-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--pico-muted-border-color);
      margin: 0 0 1.5rem 0;
      padding: 0;
      list-style: none;
    }
    .nav-tabs a {
      display: block;
      padding: 0.6rem 1.5rem;
      margin-bottom: -2px;
      border-bottom: 3px solid transparent;
      color: var(--pico-muted-color);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-tabs a:hover { color: var(--pico-primary); }
    .nav-tabs a.active {
      border-bottom-color: var(--pico-primary);
      color: var(--pico-primary);
      font-weight: 600;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="container">
    <nav>
      <ul><li><strong><a href="/" style="text-decoration:none">📶 wifibuddy</a></strong></li></ul>
    </nav>
    <ul class="nav-tabs" role="tablist">
      <li><a href="/submit" data-tab="report" class="{% if nav_active == 'report' %}active{% endif %}">📝 Report</a></li>
      <li><a href="/"       data-tab="browse" class="{% if nav_active == 'browse' %}active{% endif %}">🧭 Browse</a></li>
    </ul>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="container">
    <small>Community-tracked wifi speeds · <a href="/submit">Submit yours</a></small>
  </footer>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
